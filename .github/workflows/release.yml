name: release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to check out and publish to npm (release-please uses e.g. expo-state-mcp-v1.1.0)"
        required: true
        type: string
        default: "expo-state-mcp-v1.1.0"

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          # Prefer a PAT when "Allow GitHub Actions to create PRs" is org-disabled / greyed out.
          # Repo secret `RELEASE_PLEASE_TOKEN` (fine-grained: Contents + Pull requests write on this repo).
          # If unset, falls back to `GITHUB_TOKEN` (requires the checkbox enabled on the repo).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: github.event_name == 'push' && needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    # Explicit id-token so npm can use OIDC (workflow-level permissions do not always apply per-job the same way).
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      # Do not set registry-url here: that injects NODE_AUTH_TOKEN and makes npm use the GitHub token
      # against registry.npmjs.org, which breaks OIDC Trusted Publishing (misleading 404 on publish).
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock

      # Trusted publishing needs npm CLI >= 11.5.1 (bundled with Node 24+). Do not `npm i -g npm` on Actions — it can break the preinstalled toolchain.
      - name: Verify Node/npm for Trusted Publishing
        run: node -v && npm -v

      - name: Install
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Publish to npm (Trusted Publishing + provenance)
        run: npm publish --provenance --access public

  # Re-run a failed npm publish without a new release-please release (same workflow file = same Trusted Publisher).
  publish-retry:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Verify Node/npm for Trusted Publishing
        run: node -v && npm -v

      - name: Install
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Publish to npm (Trusted Publishing + provenance)
        run: npm publish --provenance --access public
