name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          # Prefer a PAT when "Allow GitHub Actions to create PRs" is org-disabled / greyed out.
          # Repo secret `RELEASE_PLEASE_TOKEN` (fine-grained: Contents + Pull requests write on this repo).
          # If unset, falls back to `GITHUB_TOKEN` (requires the checkbox enabled on the repo).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm CLI >= 11.5.1 and Node >= 22.14.0.
      # Older combos often fail with misleading E404 on scoped packages (npm/cli#8976).
      - name: npm version for Trusted Publishing
        run: |
          node -v
          npm -v
          npm install -g npm@^11.5.1
          npm -v

      - name: Install
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Publish to npm (Trusted Publishing + provenance)
        run: npm publish --provenance --access public
